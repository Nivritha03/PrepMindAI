version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: prepmind-postgres
    restart: always
    environment:
      POSTGRES_USER: prepmind_user
      POSTGRES_PASSWORD: prepmind_password
      POSTGRES_DB: prepmind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
